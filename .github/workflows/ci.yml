# Aura OmniMesh CI — analyze, test, and build the in-scope targets.
#
# Notes for the first run on a fresh remote:
# - Codegen output (domain_models.g.dart) and the dart2js-safe id patch
#   are COMMITTED; CI deliberately does not re-run build_runner. If a
#   schema changes without regeneration, `flutter analyze` fails here.
# - test/onnx_web_test.dart is chrome-platform only and is skipped by
#   the default VM run (it hangs on some Windows dev boxes; see its
#   header). Enable a chrome job later if the hosted runner behaves.
# - Model assets (~80 MB) live in git until the LFS migration, so
#   checkout is heavier than usual but self-contained.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Analyze (zero errors AND zero warnings)
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build Android (debug)
        run: flutter build apk --debug

      - name: Build Web
        run: flutter build web

      - name: Web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7
